{% extends 'base.html' %}
{% block content %}

<style>
body{
    background: linear-gradient(135deg,#141e30,#243b55);
}
.profile-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:90vh;
}
.profile-card{
    width:400px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(0,0,0,0.4);
    text-align:center;
    color:white;
}
.profile-img{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:15px;
}
input{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
}
button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ff4b2b;
    color:white;
    cursor:pointer;
}
a{
    color:white;
    font-size:12px;
    display:block;
    margin-top:5px;
}
h2{
    margin-bottom:20px;
}
</style>

<div class="profile-container">
  <div class="profile-card">

    <h2>Profilee</h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      {% if user.profile.image %}
        <img src="{{ user.profile.image.url }}" class="profile-img">
        <a href="{% url 'remove_photo' %}">Remove Photo</a>
      {% else %}
        <input type="file" name="image">
      {% endif %}

      <input type="text" name="username" value="{{ user.username }}" placeholder="Username">
      <input type="email" name="email" value="{{ user.email }}" placeholder="Email">
      <input type="text" name="phone" value="{{ user.profile.phone }}" placeholder="Phone Number">

      {% if not user.profile.image %}
        <button type="submit">Add Photo & Update</button>
      {% else %}
        <button type="submit">Update</button>
      {% endif %}

    </form>
  </div>
</div>

{% endblock %}
