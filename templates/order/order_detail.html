<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details #{{ order.id }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdecef; margin: 0; }
        
        .container { max-width: 500px; margin: 20px auto; padding: 15px; }
        
        /* Circular Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            background-color: white;
            color: #ff4f81;
            border-radius: 50%;
            text-decoration: none;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: 0.3s;
            border: 1px solid #ffc2d1;
            margin-bottom: 15px;
        }

        .back-btn:hover {
            background-color: #ff4f81;
            color: white;
            transform: translateX(-3px);
        }

        .card { 
            background: white; 
            border-radius: 15px; 
            padding: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        }

        h3 { margin-top: 0; color: #333; font-size: 20px; }
        
        /* Status Badge Styling */
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-Pending { background: #fff4e5; color: #ff9800; }
        .status-Confirmed { background: #e3f2fd; color: #2196f3; }
        .status-Delivered { background: #e8f5e9; color: #4caf50; }
        .status-Cancelled { background: #ffebee; color: #f44336; }

        .item-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 0; 
            border-bottom: 1px dashed #eee; 
            color: #555;
        }

        .item-name { font-weight: 500; }

        .total { 
            font-size: 22px; 
            font-weight: bold; 
            color: #ff4f81; 
            text-align: right; 
            margin-top: 25px; 
        }

        .order-meta {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'order_list' %}" class="back-btn">
            <i class="bi bi-chevron-left"></i>
        </a>

        <div class="card">
            <h3>Order Details #{{ order.id }}</h3>
            
            <div class="order-meta">
                <p>Placed on: {{ order.created_at|date:"D, d M Y, H:i" }}</p>
                Status: <span class="status-badge status-{{ order.status }}">{{ order.status }}</span>
            </div>
            
            <hr style="border: none; border-top: 1px solid #eee;">

            <p style="font-weight: bold; font-size: 14px; color: #777;">ITEMS SUMMARY</p>
            
            {% for item in items %}
            <div class="item-row">
                <span class="item-name">{{ item.product.name }} <small>(x{{ item.quantity }})</small></span>
                <span style="font-weight: bold;">₹{{ item.subtotal }}</span>
            </div>
            {% endfor %}

            <div class="total">
                <small style="font-size: 12px; color: #999; display: block; font-weight: normal;">Amount Paid</small>
                ₹{{ order.total_amount }}
            </div>
        </div>
    </div>
</body>
</html>
