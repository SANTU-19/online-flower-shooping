<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
            <h2 class="text-center mb-4">Complete Order</h2>
            <p class="text-center">Total to pay: <strong>₹{{ total }}</strong></p>
            
            <div class="d-grid gap-2">
                <button onclick="confirmOrder('COD')" class="btn btn-warning">Cash on Delivery</button>
                <button onclick="confirmOrder('ONLINE')" class="btn btn-primary">Pay Online</button>
            </div>
        </div>
    </div>

    <script>
    function confirmOrder(method) {
        Swal.fire({
            title: 'Confirm Order?',
            text: `Place order using ₹{method}?`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Yes, Confirm',
            cancelButtonText: 'No'
        }).then((result) => {
            if (result.isConfirmed) {
                processOrder(method);
            }
        });
    }

    function processOrder(method) {
        const formData = new FormData();
        formData.append('payment', method);
        formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

        fetch("{% url 'place_order' %}", {
            method: 'POST',
            body: formData,
            headers: {'X-Requested-With': 'XMLHttpRequest'}
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                Swal.fire({
                    title: 'Congratulations!',
                    text: 'Order Confirmed!',
                    icon: 'success',
                    timer: 1000,
                    showConfirmButton: false
                });
                setTimeout(() => {
                    window.location.href = "/"; // Redirects to Home page
                }, 1000);
            } else {
                Swal.fire('Error', data.error, 'error');
            }
        });
    }
    </script>
</body>
</html>
