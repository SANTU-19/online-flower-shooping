<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            background: #ffffff;
            width: 380px;
            padding: 32px;
            border-radius: 10px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.25);
            animation: fadeIn 0.5s ease-in-out;
        }

        .auth-box h2 {
            text-align: center;
            margin-bottom: 22px;
            color: #333;
        }

        .auth-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .auth-box input:focus {
            outline: none;
            border-color: #11998e;
        }

        .auth-box button {
            width: 100%;
            padding: 12px;
            background: #11998e;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .auth-box button:hover {
            background: #0e8b80;
        }

        .auth-note {
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="auth-box">
    <h2>Reset Password</h2>

    <form method="POST" action="{% url 'reset_password' %}">
        {% csrf_token %}
        <input type="password" name="password" placeholder="New password" required>
        <input type="password" name="confirm_password" placeholder="Confirm password" required>
        <button type="submit">Reset Password</button>
    </form>

    <p class="auth-note">Choose a strong password you can remember</p>
</div>

</body>
</html>
